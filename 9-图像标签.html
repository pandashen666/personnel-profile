<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>图像标签</title>

</head>

<body>

  <h2>图像标签的基本应用：</h2>
  <img src="蜡笔小新.jpg" alt="蜡笔小新" />
  <h2>图像标签的基本应用：</h2>
  <img src="蜡笔小新.jpg" alt="蜡笔小新" width="300" />
  <h2>图像标签的基本应用：</h2>
  <!-- 一般只修改高度和宽度其中一个，剩下等比例缩放Z -->
  <img src="蜡笔小新.jpg" alt="蜡笔小新" width="300" height="300" />
  <h2>图像标签添加title:</h2>
  <img src="蜡笔小新.jpg" alt="蜡笔小新" width="300" title="蜡笔小新" />

  <h2>插入不同类型的图：</h2>
  <img src="蜡笔小新.jpg" alt="蜡笔小新" />
  <img src="吃webp.webp" alt="吃webp" />
  <img src="淘宝发钱gif.gif" alt="淘宝发钱gif" />
  <img src="b站图片.avif" alt="b站图片" />
  <img src="5.png" alt="5" />
</body>

</html>
