<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的前端作品集</title>
  <style>
    /* 基础样式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', sans-serif;
      background: #f0f2f5;
      padding: 40px;
    }
    h1 { text-align: center; margin-bottom: 40px; color: #333; }

    /* --- 今天的重点：CSS Grid 网格布局 --- */
    .project-grid {
      display: grid;
      /* 每列最小 250px，自动填满一行 */
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px; /* 卡片之间的间隙 */
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 作品卡片样式 */
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      color: #333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.15);
      background: #f8f9ff;
    }
    .card h3 { font-size: 18px; margin-bottom: 10px; }
    .card p { font-size: 14px; color: #666; }
  </style>
</head>
<body>

  <h1>🚀 我的前端学习作品集</h1>

  <div class="project-grid">
    <!-- 这里的 href 要注意路径！ -->
    <a href="img/14-个人名片仿练.html" class="card">
      <h3>14. 个人名片仿练</h3>
      <p>学习了 Flexbox、暗黑模式和 JS 交互</p>
    </a>

    <a href="img/13-个人名片展示页练手.html" class="card">
      <h3>13. 个人名片练手</h3>
      <p>初探玻璃拟态效果</p>
    </a>

    <a href="9-图像标签.html" class="card">
      <h3>09. 图像标签应用</h3>
      <p>学习了相对路径和各种图片格式</p>
    </a>

    <!-- 你可以继续添加其他练习的卡片 -->
     <a href="img/" class="card">
      <h3>11. 视频，音频标签</h3>
      <p>学习了视频，音频标签</p>
    </a>


  </div>

</body>
</html>
