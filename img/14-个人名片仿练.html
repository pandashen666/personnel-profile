 <!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人名片仿练</title>

  <style>
    /* 新加功能：暗夜与白日模式 */
    /* 统一管理颜色 */
    :root {
      --bg-color: linear-gradient(135deg,#6667 0%, #764ba2 100%);
      --card-bg: rgba(255,255,255,0.1);
      --text-color: #fff;
      --border-color: rgba(255, 255, 255, 0.2);
    }

    /* 暗黑模式 */
    body.dark-theme {
      --bg-color: linear-gradient(135deg, #333 0%, #444 100%);
      --card-bg: rgba(0, 0, 0, 0.2);
      --text-color: #7a7373;
      --border-color: rgba(255, 255, 255, 0.2);
    }


    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg,#667eea 0%, #764ba2 100%);
      min-height: 100vh;
        display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      /* 暗黑模式下控制背景颜色变量 */
      background: var(--bg-color);
      color: var(--text-color);
    }

    .profile-card {
      background: var(--card-bg);
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(10px);
      border-radius: 20px;
       text-align: center;
       width: 320px;
       height: auto;
       box-shadow: 0 0 10px rgba(132, 57, 57, 0.2);
       border: 1px solid var(--border-color);
       animation: slideIn 0.5s ease-in-out;
    }

    /* 主题切换按钮 */
    .theme-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-color);
      transition: color 0.3s;
    }
    .theme-btn:hover {
      color: var(--border-color);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      
      /* 圆形的关键 */
      border: 3px solid #fff;
      margin-bottom: 20px;
      object-fit: cover;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 25px;
    }
    .skills {
      display: flex;
      justify-content: center; /* 水平居中 */
      gap: 10px;               /* 标签之间的缝隙 */
      margin-bottom: 25px;     /* 和下面的链接按钮拉开距离 */
      flex-wrap: wrap;         /* 如果标签太多，自动换行 */
    }
    .skill-tag {
      background: rgba(255, 255, 255, 0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .links {
      display: flex;
      gap: 15px;
      flex-direction: column;
      align-items: center;
       margin-bottom: 15px;
     
    }

    .link-btn {
     color: hotpink;
     background-color: #fff;
     text-decoration: none;
     border-radius: 8px;
     padding: 12px 24px;
     min-width: 200px;
     border-radius: 10px;
     transition: transform 0.2s, background 0.2s;

    }

    .link-btn:hover {
   transform: scale(1.05);
   background-color: rgb(215, 181, 198);
   color: #fff;
  
    }

    /* 给卡片姓名处加框 */
    #name {
      font-size: 24px;
      margin-bottom: auto;
      border: 2px solid rgb(184, 109, 146);
     background-color: #fff;
     border-radius: 8px;
     padding: 12px 24px;
     min-width: 200px;
     border-radius: 10px;
     cursor: pointer;
     transition: transform 0.2s, background 0.2s;
      display: inline-block;
        color: rgb(184, 109, 146);
    }

@media (max-width: 768px) {
      /* 手机端缩小卡片内边距 */
      .profile-card {
        padding: 20px 15px;
      }
      
      /* 缩小头像尺寸 */
      .avatar {
        width: 80px;
        height: 80px;
      }
      
      /* 缩小标题字体 */
      h2 {
        font-size: 20px;
      }
      
      /* 缩小按钮宽度，适配手机 */
      .link-btn {
        min-width: 160px;
        padding: 10px 20px;
      }
      
      /* 缩小技能标签内边距 */
      .skill-tag {
        padding: 4px 10px;
        font-size: 11px;
      }
    }

    @media (max-width: 500px) {
  .profile-card {
    width: 90%;          /* 手机上卡片宽一点 */
    padding: 20px;       /* 缩小内边距 */
  }
  h2 { font-size: 20px; } /* 名字稍微变小 */
}


/* 1. 定义一个叫 "slideUp" 的动画 */
@keyframes slideUp {
  from {
    transform: translateY(50px); /* 从下方 50px 的位置开始 */
    opacity: 0.3;                 
  }
  to {
    transform: translateY(0);    /* 移动到原始位置 */
    opacity: 1;                  /* 完全不透明 */
  }
}

/* 2. 把动画应用到卡片上 */
.profile-card {
  /* ...你的其他样式... */
  animation: slideUp 0.8s ease-out; /* 动画名 持续时间 速度曲线 */
}
/* 爱心动画 */
@keyframes heartBeat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.animate-heart {
  animation: heartBeat 0.3s ease-in-out;
}
  </style>
</head>
<body>
  <!-- 新增的主题切换按钮 -->
  <button class="theme-btn" id="theme-btn">☀️</button>

  <div class="profile-card">
    <img src="../蜡笔小新.jpg" alt="头像" class="avatar">
  <h2 id="name">Your name</h2>
  <p>打出你的名字新人</p>
  <!-- 新增的技能区域 -->
   <div class="skills">
    <span class="skill-tag">HTML5</span>
    <span class="skill-tag">CSS3</span>
    <span class="skill-tag">Flexbox</span>
    <span class="skill-tag">JavaScript (学习中)</span>
   </div>
   <div class="links">
    <a href="#" class="link-btn">我的博客</a>
    <a href="#" class="link-btn">GitHub 仓库</a>
    <a href="#" class="link-btn">联系我</a>
   </div>
   <div class="stats" style="margin-top: 20px;">
  <button id="like-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;">
    ❤️ <span id="like-count" style="font-size: 16px; color: #fff; margin-left: 5px;">0</span>
  </button>
</div>

  </div>
  <script>
    // 1. 获取元素
    const nameTag = document.getElementById('name');
    
    const names = ["练习生", "Bug架构师", "代码魔法师", "未来的架构师","熬夜冠军"];
    //2.监听点击事件
    nameTag.addEventListener('click', () => {
      //生成随机索引（0~4）
     const randomIndex = Math.floor(Math.random() * names.length);
     nameTag.textContent = names[randomIndex];
     //根据索引选出名字
     const selectedName = names[randomIndex];
     //根据选中的名字改变文字颜色
     if (selectedName === "练习生") {
      nameTag.style.color = "red";
     } else if (selectedName === "Bug架构师") {
      nameTag.style.color = "orange";
     } else if (selectedName === "代码魔法师") {
      nameTag.style.color = "purple";
     } else if (selectedName === "未来的架构师") {
      nameTag.style.color = "green";
     } else if (selectedName === "熬夜冠军") {
      nameTag.style.color = "blue";
     }
    });

    //1.定义变量存点赞数
    let count = 0;
    //2.获取点赞元素(按钮和点赞数)
    const likeBtn = document.getElementById('like-btn');
    const likeCount = document.getElementById('like-count');
    //3.监听点赞按钮点击事件
    likeBtn.addEventListener('click',() => {
    //数字加一
    count++;
    console.log("当前点赞数:", +count);
    //更新点赞数显示
    likeCount.innerText = count;
    //添加爱心动画类
    likeBtn.classList.add('animate-heart');
    //1秒后移除动画类（实现动画效果）
    setTimeout(() => {
      likeBtn.classList.remove('animate-heart');
    }, 1000);
}); 
  
// 新增功能：暗夜与白日模式
    //1.暗夜与白日切换按钮
    const themeBtn = document.getElementById('theme-btn');
    //2.监听切换按钮事件
    themeBtn.addEventListener('click',() => {
      //切换body类名
      document.body.classList.toggle('dark-theme');
      //改图标
      if (document.body.classList.contains('dark-theme')) {
        themeBtn.textContent = '🌙';
      } else {
        themeBtn.textContent = '☀️';
      }
    });
    
  </script>
</body>
</html>
