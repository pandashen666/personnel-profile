<!DOCTYPE html>
<html>


<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <head> <title>多媒体播放中心</title>
  <style>
    /* 基础重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 返回按钮样式 */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 20px;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s;
      z-index: 1000;
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-5px);
    }

    /* 播放器容器卡片 */
    .player-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      color: #fff;
    }

    .section {
      margin-bottom: 30px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      background: #000;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    /* 装饰用的小标题 */
    .player-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .player-header h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
<!-- 返回首页按钮 -->
<a href="../index.html" style="position: fixed; top: 20px; left: 20px;
 text-decoration: none; background: rgba(255,255,255,0.2); 
 padding: 10px 15px; border-radius: 8px; color: #fff; font-size: 14px; 
 backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); z-index: 1000;">
  ← 返回首页
</a>

  <div class="section">
    <h2>📺 视频展示</h2>
 
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" controls poster="https://via.placeholder.com/600x340/000/fff?text=Big+Buck+Bunny"></video>
  </div>

  <div class="section">
    <h2>🎵 音频欣赏</h2>
 
    <audio
      src="https://www.w3schools.com/html/horse.mp3"
      controls></audio>
  </div>


</body>

</html>
