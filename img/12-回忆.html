<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>简单学习页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Microsoft YaHei;
      background: #f8f9fa;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgb(48, 44, 44);
      padding: 30px;
      border-radius: 8px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      line-height: 1.7;
      color: #333;
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>开始</h1>
    <p>内容：HTML + CSS 基础布局</p>
    <p>状态</p>
    <button class="btn">开始</button>
  </div>
</body>

</html>
