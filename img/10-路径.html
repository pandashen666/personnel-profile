<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>图像标签</title>

</head>

<body>

  <h2>路径：</h2>
  <h3>一.相对路径：</h3>
  <h4>1.同一级路径</h4>
  <img src="蜡笔小新.jpg" alt="蜡笔小新" />
  <h4>2.下一级路径</h4>
  <img src="img/5.png" alt="5" />
  <img src="./img/5.png" alt="5" />
  <h4>3.上一级路径</h4>
  <img src="../1/蜡笔小新.jpg" alt="蜡笔小新" />
  <!-- 这里是上一级目录的1文件夹下的蜡笔小新.jpg -->

  <h3>二.绝对路径：</h3>
  <h4>1.盘符形式</h4>
  <img src="D:\trae\1\蜡笔小新.jpg" alt="蜡笔小新" />
  <h4>2.网络地址</h4>
  <img src="https://www.baidu.com/img/flexible/logo/pc/result.png" alt="百度" />


</body>

</html>
